<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AnyCraft</title>
<style>
body{
margin:0;
overflow:hidden;
background:#87ceeb;
font-family:Arial;
}
canvas{
display:block;
image-rendering:pixelated;
}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
text-shadow:2px 2px black;
}
#hotbar{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
}
.slot{
width:50px;
height:50px;
border:2px solid white;
background:#555;
margin:2px;
}
</style>
</head>
<body>

<div id="ui">
❤️ 20<br>
🍖 20
</div>

<div id="hotbar">
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const TILE=32;

let player={
x:200,
y:100,
w:28,
h:28,
vx:0,
vy:0,
ground:false
};

let keys={};

document.onkeydown=e=>keys[e.key]=true;
document.onkeyup=e=>keys[e.key]=false;

let world=[];

for(let x=0;x<100;x++){

world[x]=[];

for(let y=0;y<30;y++){

if(y>16) world[x][y]=1;
else world[x][y]=0;

}

}

canvas.oncontextmenu=e=>e.preventDefault();

canvas.onmousedown=function(e){

let rect=canvas.getBoundingClientRect();

let mx=Math.floor((e.clientX-rect.left)/TILE);

let my=Math.floor((e.clientY-rect.top)/TILE);

if(e.button==0){

world[mx][my]=0;

}

if(e.button==2){

world[mx][my]=1;

}

}

function update(){

player.vx=0;

if(keys["a"]) player.vx=-4;
if(keys["d"]) player.vx=4;

if(keys[" "]&&player.ground){

player.vy=-12;
player.ground=false;

}

player.vy+=0.6;

player.x+=player.vx;
player.y+=player.vy;

player.ground=false;

let tx=Math.floor((player.x+14)/TILE);
let ty=Math.floor((player.y+28)/TILE);

if(world[tx]&&world[tx][ty]==1){

player.y=ty*TILE-player.h;
player.vy=0;
player.ground=true;

}

draw();

requestAnimationFrame(update);

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#87ceeb";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let x=0;x<100;x++){

for(let y=0;y<30;y++){

if(world[x][y]==1){

ctx.fillStyle="#6b4423";
ctx.fillRect(x*TILE,y*TILE,TILE,TILE);

ctx.fillStyle="#3cb043";
ctx.fillRect(x*TILE,y*TILE,TILE,5);

}

}

}

ctx.fillStyle="blue";
ctx.fillRect(player.x,player.y,player.w,player.h);

}

update();

</script>

</body>
</html>
